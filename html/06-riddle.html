<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="utf-8">
        <title>R&auml;tsel 6 | Escape Room</title>
        <link rel="stylesheet" href="../css/style.css">
    </head>
    <body>
        
        <div class="header">
            <div>Antisemitismus Woche</div>
            <div>Thema: Ideologie</div>
        </div>
        
        <div class="content">
            <div class="side left">
                <ul class="linklist">
                    <li><a href="./resources.html">Ressourcen</a></li>
                    <li><a href="./01-riddle.html">R&auml;tsel 1</a></li>
                    <li><a href="./02-riddle.html">R&auml;tsel 2</a></li>
                    <li><a href="./03-riddle.html">R&auml;tsel 3</a></li>
                    <li><a href="./04-riddle.html">R&auml;tsel 4</a></li>
                    <li><a href="./05-riddle.html">R&auml;tsel 5</a></li>
                    <li><a href="./06-riddle.html">R&auml;tsel 6</a></li>
                    <li><a href="./07-riddle.html">R&auml;tsel 7</a></li>
                    <li><a href="./08-riddle.html">R&auml;tsel 8</a></li>
                </ul>
            </div>
            
            <div class="side right">
                <h2>R&auml;tsel 6</h2>
                <div class="riddle-specifics">
                    <h1>~ Das B&uuml;cherregal ~</h1>
                    <div class="code-input-container">
                        <input type="text" class="code-input one" maxlength="1" oninput="moveToNext(this)" onkeydown="moveToPrev(this, event)">
                        <input type="text" class="code-input two" maxlength="1" oninput="moveToNext(this)" onkeydown="moveToPrev(this, event)">
                        <input type="text" class="code-input three" maxlength="1" oninput="moveToNext(this)" onkeydown="moveToPrev(this, event)">
                        <input type="text" class="code-input four" maxlength="1" oninput="moveToNext(this)" onkeydown="moveToPrev(this, event)">
                        <input type="text" class="code-input five" maxlength="1" oninput="moveToNext(this)" onkeydown="moveToPrev(this, event)">
                        <input type="text" class="code-input six" maxlength="1" oninput="moveToNext(this)" onkeydown="moveToPrev(this, event)">
                        <input type="text" class="code-input seven" maxlength="1" oninput="moveToNext(this)" onkeydown="moveToPrev(this, event)">
                        <input type="text" class="code-input eight" maxlength="1" oninput="moveToNext(this)" onkeydown="moveToPrev(this, event)">
                        <!-- the type has to be "text" in order for maxlength to only allow the input of one digit -->
                    </div>
                    <div class="button-container">
                        <button class="submit" onclick="checkCode()">Fertig!</button>
                    </div>
                    <div class="error-message">Hier k&ouml;nnte ein Fehler vorliegen!</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="solution one"></div>
            <div class="solution two"></div>
            <div class="solution three"></div>
            <div class="solution four"></div>
            <div class="solution five"></div>
            <div class="solution six"></div>
            <div class="solution seven"></div>
            <div class="solution eight"></div>
            <div class="solution nine"></div>
            <div class="solution ten"></div>
            <div class="solution eleven"></div>
        </div>

        <script type="text/javascript" src="../js/script.js"></script>
        <script>
            let solutionArray = retrieveArray();
            showObtainedSolutionLetters(solutionArray);
            lockInputsIfSolved();

            function checkCode() {
                if (checkForEmptyInputs()) { //if all Inputs have values:
                    if (
                        //check if the entered values are correct:
                        document.querySelector('.code-input.one').value == 8 &&
                        document.querySelector('.code-input.two').value == 6 &&
                        document.querySelector('.code-input.three').value == 2 &&
                        document.querySelector('.code-input.four').value == 5 &&
                        document.querySelector('.code-input.five').value == 3 &&
                        document.querySelector('.code-input.six').value == 1 &&
                        document.querySelector('.code-input.seven').value == 7 &&
                        document.querySelector('.code-input.eight').value == 9
                    ){ //if entered values are correct
                        revealSolution();
                    } else { //if entered calues are not correct
                        document.querySelector('.error-message').innerHTML = 'Inkorrekt. Versuch es noch einmal!';
                        document.querySelector('.error-message').style.color = 'rgb(224, 111, 111)';
                    }
                } else { //if there is at least one empty input
                    document.querySelector('.error-message').innerHTML = 'Es gibt noch leere Eingabe-Felder!';
                    document.querySelector('.error-message').style.color = 'rgb(224, 111, 111)';
                }
            } //checkCode()

            function revealSolution() {
                document.querySelector('.error-message').style.color = 'white';
                solutionArray[5] = 'true';
                storeArray(solutionArray);
                showObtainedSolutionLetters(solutionArray);
                lockInputsIfSolved();
            } //revealSolution()

            function lockInputsIfSolved() {
                if (solutionArray[5] == 'true') {
                    document.querySelector('.code-input.one').value = 8;
                    document.querySelector('.code-input.two').value =  6;
                    document.querySelector('.code-input.three').value = 2; 
                    document.querySelector('.code-input.four').value = 5; 
                    document.querySelector('.code-input.five').value = 3; 
                    document.querySelector('.code-input.six').value = 1; 
                    document.querySelector('.code-input.seven').value = 7; 
                    document.querySelector('.code-input.eight').value = 9;

                    document.querySelector('.code-input.one').disabled = true;
                    document.querySelector('.code-input.two').disabled = true;
                    document.querySelector('.code-input.three').disabled = true;
                    document.querySelector('.code-input.four').disabled = true;
                    document.querySelector('.code-input.five').disabled = true;
                    document.querySelector('.code-input.six').disabled = true;
                    document.querySelector('.code-input.seven').disabled = true;
                    document.querySelector('.code-input.eight').disabled = true;
                }
            } //lockInputsIfSolved()
        </script>
    </body>
</html>
